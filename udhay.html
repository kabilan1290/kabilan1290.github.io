    accessMethod = "window.__electronIpcRenderer (leaked)";
    log("✓ Found __electronIpcRenderer", "ok");

  // Method E: postMessage to parent (if running inside a BrowserView with a bridge)

    send: (ch, ...args) => {
      window.postMessage({ type: "ipc-send", channel: ch, args }, "*");

  };
  accessMethod = "postMessage bridge (fallback — may not reach main process)";
  log("⚠ Using postMessage fallback", "warn");
  return false;
}
