
<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>AI Analysis Renderer (offline)</title>
    <style>
:root {
    --brand-primary: #3949ab;
    --text: #111827;
    --muted: #64748b;
    --line: #dbe4f0;
    --soft: #f8fafc;
    --panel: #ffffff;
}

* {
    box-sizing: border-box;
}

html {
    height: 100%;
}

body {
    margin: 0;
    height: 100%;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    background: #eef2f7;
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
}

.app-header {
    flex: 0 0 auto;
    min-height: 82px;
    padding: 14px 22px;
    background: var(--brand-primary);
    color: white;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 18px;
}

.app-header h1 {
    margin: 0 0 4px;
    font-size: 22px;
    font-weight: 700;
}

.app-header p {
    margin: 0;
    color: rgba(255, 255, 255, 0.82);
    font-size: 14px;
}

.workspace {
    flex: 1 1 auto;
    min-height: 0;
    display: grid;
    grid-template-columns: 360px minmax(0, 1fr);
    grid-template-rows: minmax(0, 1fr);
    overflow: hidden;
}

.sidebar {
    background: #f8fbff;
    border-right: 1px solid var(--line);
    display: flex;
    flex-direction: column;
    min-width: 0;
    min-height: 0;
    overflow: hidden;
}

.sidebar-top {
    flex: 0 0 auto;
    padding: 16px;
    border-bottom: 1px solid var(--line);
    background: white;
}

.sidebar-top h2 {
    margin: 0 0 12px;
    font-size: 16px;
}

.load-status {
    margin: -6px 0 10px;
    color: var(--muted);
    font-size: 12px;
    line-height: 1.35;
}

.sidebar-top input {
    width: 100%;
    height: 36px;
    border: 1px solid #cbd5e1;
    border-radius: 6px;
    padding: 0 10px;
    font-size: 14px;
}

.analysis-cards {
    flex: 1 1 auto;
    min-height: 0;
    overflow-x: hidden;
    overflow-y: auto;
    padding: 12px;
    overscroll-behavior: contain;
    -webkit-overflow-scrolling: touch;
}

.analysis-card {
    width: 100%;
    text-align: left;
    border: 1px solid #d9e2ef;
    background: white;
    border-radius: 8px;
    padding: 12px;
    margin-bottom: 10px;
    cursor: pointer;
    color: inherit;
}

.analysis-card:hover,
.analysis-card.active {
    border-color: var(--brand-primary);
    box-shadow: 0 8px 22px rgba(15, 23, 42, 0.08);
}

.card-title {
    font-size: 15px;
    font-weight: 700;
    margin-bottom: 6px;
    word-break: break-word;
}

.card-run {
    font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    color: var(--muted);
    font-size: 12px;
    word-break: break-all;
}

.card-footer {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 10px;
    flex-wrap: wrap;
}

.score-pill {
    display: inline-flex;
    align-items: center;
    min-height: 24px;
    padding: 0 9px;
    border-radius: 999px;
    background: #eef2ff;
    color: var(--brand-primary);
    font-size: 12px;
    font-weight: 700;
}

.detail-pane {
    min-width: 0;
    min-height: 0;
    overflow-x: auto;
    overflow-y: auto;
    overscroll-behavior: contain;
    -webkit-overflow-scrolling: touch;
    background: white;
}

.selected-meta {
    min-height: 58px;
    padding: 14px 16px;
    border-bottom: 1px solid var(--line);
    background: #fbfdff;
}

.selected-meta h2 {
    margin: 0 0 4px;
    font-size: 18px;
}

.selected-meta div {
    color: var(--muted);
    font-size: 13px;
}

.score-panel {
    margin: 16px;
    padding: 14px;
    border: 1px solid #d9e2ef;
    border-radius: 8px;
    background: #fbfdff;
}

.score-grid {
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 10px;
    margin-bottom: 10px;
}

.score-box {
    border: 1px solid #e5e7eb;
    background: white;
    border-radius: 6px;
    padding: 10px;
}

.score-label {
    color: var(--muted);
    font-size: 12px;
    font-weight: 600;
    margin-bottom: 5px;
}

.score-value {
    font-size: 18px;
    font-weight: 800;
}

.score-links {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
}

.score-links a {
    display: inline-flex;
    align-items: center;
    min-height: 28px;
    padding: 0 10px;
    border: 1px solid #c7d2fe;
    border-radius: 6px;
    background: #eef2ff;
    color: var(--brand-primary);
    font-size: 13px;
    font-weight: 700;
    text-decoration: none;
}

.score-links a:hover {
    background: #e0e7ff;
}

.muted-value {
    color: var(--muted);
    font-size: 14px;
}

.score-justification {
    color: #374151;
    font-size: 14px;
    line-height: 1.55;
}

.renderer-shell {
    background: white;
    padding: 0 16px 64px;
}

.empty-state,
.empty-detail {
    padding: 24px;
    color: var(--muted);
    text-align: center;
    font-size: 14px;
}

@media (max-width: 860px) {
    .app-header {
        min-height: 0;
        align-items: flex-start;
        flex-direction: column;
    }

    .workspace {
        grid-template-columns: 1fr;
        grid-template-rows: minmax(0, 38vh) minmax(0, 1fr);
    }

    .sidebar {
        min-height: 0;
        border-right: 0;
        border-bottom: 1px solid var(--line);
    }

    .score-grid {
        grid-template-columns: 1fr;
    }
}

    </style>
</head>
<body>
<header class="app-header">
        <div>
            <h1>AI Analysis Renderer</h1>
            <p>Offline bundle — analysis.json and analysis_score.json embedded (no server).</p>
        </div>
    </header>

    <main class="workspace">
        <aside class="sidebar">
            <div class="sidebar-top">
                <h2>Analyses</h2>
                <div id="loadStatus" class="load-status">Scanning content...</div>
                <input id="searchInput" type="search" placeholder="Search cards">
            </div>
            <div id="analysisCards" class="analysis-cards">
                <div class="empty-state">Loading analyses...</div>
            </div>
        </aside>

        <section class="detail-pane">
            <div id="selectedMeta" class="selected-meta">
                <div class="empty-detail">No analysis selected.</div>
            </div>
            <div id="scorePanel" class="score-panel" hidden></div>
            <div id="aiAnalyzerList" class="renderer-shell"></div>
        </section>
    </main>

    <script>

(function () {
  const raw = document.getElementById('standalone-bundle-b64').textContent.trim();
  const bin = atob(raw);
  const bytes = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
  const text = new TextDecoder('utf-8').decode(bytes);
  const BUNDLE = JSON.parse(text);
  const responses = BUNDLE.responses || {};
  const origFetch = window.fetch.bind(window);
  window.fetch = function (input, init) {
    let url = typeof input === 'string' ? input : (input && input.url) || '';
    if (!url) return origFetch(input, init);
    let path;
    try {
      path = new URL(url, document.baseURI).pathname;
    } catch (e) {
      path = url.split('?')[0];
    }
    if (Object.prototype.hasOwnProperty.call(responses, path)) {
      const body = JSON.stringify(responses[path]);
      return Promise.resolve(
        new Response(body, { status: 200, headers: { 'Content-Type': 'application/json' } })
      );
    }
    return origFetch(input, init);
  };
})();

    <script>
const SKIP_FIELDS = [
    'analysis_metadata',
    'analysis_timestamp',
    'analysis_type',
    'extension_id',
    'extension_name',
    'extension_version',
    'analyzer_version',
    'metadata'
];

let currentAnalysisData = null;
let currentActiveTab = 'summary';
let loadedItems = [];
let selectedItemId = null;

const searchInput = document.getElementById('searchInput');
const analysisCards = document.getElementById('analysisCards');
const selectedMeta = document.getElementById('selectedMeta');
const scorePanel = document.getElementById('scorePanel');
const loadStatus = document.getElementById('loadStatus');

searchInput.addEventListener('input', renderCards);
document.addEventListener('DOMContentLoaded', loadContentIndex);

async function loadContentIndex() {
    try {
        loadedItems = await fetchItemsFromIndex();
    } catch (error) {
        loadedItems = [];
        analysisCards.innerHTML = `
            <div class="empty-state">
                Failed to load embedded analysis bundle.
                <br><br>${escapeHtml(error.message)}
            </div>
        `;
        loadStatus.textContent = 'Index load failed.';
        return;
    }

    selectedItemId = null;
    loadStatus.textContent = `${loadedItems.length} analysis folder${loadedItems.length === 1 ? '' : 's'} found.`;
    renderCards();

    if (loadedItems.length > 0) {
        await selectItem(loadedItems[0].id);
    } else {
        selectedMeta.innerHTML = '<div class="empty-detail">No indexed analyses found.</div>';
        scorePanel.hidden = true;
        document.getElementById('aiAnalyzerList').innerHTML = '';
    }
}

async function fetchItemsFromIndex() {
    const index = await fetchJson('/api/content-index');
    if (!Array.isArray(index)) {
        throw new Error('content-index.json must contain an array');
    }

    const items = [];
    for (const entry of index) {
        let score = entry.scorePreview || {};
        try {
            score = await fetchJson(entry.scorePath);
        } catch {
            /* analysis_score.json may be missing for partial runs */
        }
        items.push({ ...entry, score: score || entry.scorePreview || {} });
    }
    return items.sort((a, b) => a.title.localeCompare(b.title) || a.runId.localeCompare(b.runId));
}

function renderCards() {
    const query = searchInput.value.trim().toLowerCase();
    const visibleItems = loadedItems.filter((item) => {
        return !query || item.path.toLowerCase().includes(query) || item.title.toLowerCase().includes(query);
    });

    if (visibleItems.length === 0) {
        analysisCards.innerHTML = '<div class="empty-state">No matching analyses.</div>';
        return;
    }

    analysisCards.innerHTML = '';
    visibleItems.forEach((item) => {
        const card = document.createElement('button');
        card.type = 'button';
        card.className = `analysis-card${item.id === selectedItemId ? ' active' : ''}`;
        card.onclick = () => selectItem(item.id);

        const title = document.createElement('div');
        title.className = 'card-title';
        title.textContent = item.title;
        card.appendChild(title);

        const run = document.createElement('div');
        run.className = 'card-run';
        run.textContent = item.runId;
        card.appendChild(run);

        const footer = document.createElement('div');
        footer.className = 'card-footer';
        footer.appendChild(createScorePill(item.score || item.scorePreview));
        card.appendChild(footer);

        analysisCards.appendChild(card);
    });
}

async function selectItem(itemId) {
    const item = loadedItems.find((candidate) => candidate.id === itemId);
    if (!item) return;

    selectedItemId = itemId;
    renderCards();

    selectedMeta.innerHTML = `
        <h2>${escapeHtml(item.title)}</h2>
        <div>${escapeHtml(item.path)}</div>
    `;

    renderScorePanel(item.score, item.links || []);

    try {
        const analysis = await fetchJson(item.analysisPath);
        renderJsonAnalysis(analysis);
    } catch (error) {
        document.getElementById('aiAnalyzerList').innerHTML = `<div class="empty-state">Failed to parse analysis.json: ${escapeHtml(error.message)}</div>`;
    }
}

function renderScorePanel(score, links = []) {
    scorePanel.hidden = false;
    const riskScore = score?.risk_score ?? 'N/A';
    const riskLevel = score?.risk_level ?? 'N/A';
    const justification = score?.risk_score_justification || score?.justification || '';
    const linkMarkup = renderLinksMarkup(links);

    scorePanel.innerHTML = `
        <div class="score-grid">
            <div class="score-box">
                <div class="score-label">Risk Score</div>
                <div class="score-value">${escapeHtml(String(riskScore))}</div>
            </div>
            <div class="score-box">
                <div class="score-label">Risk Level</div>
                <div class="score-value">${escapeHtml(String(riskLevel))}</div>
            </div>
            <div class="score-box">
                <div class="score-label">Links</div>
                <div class="score-links">${linkMarkup || '<span class="muted-value">N/A</span>'}</div>
            </div>
        </div>
        ${justification ? `<div class="score-justification">${escapeHtml(justification)}</div>` : ''}
    `;
}

function renderLinksMarkup(links) {
    return links
        .filter(link => link && link.url)
        .map(link => {
            const label = link.label || link.url;
            return `<a href="${escapeAttribute(link.url)}" target="_blank" rel="noreferrer">${escapeHtml(label)}</a>`;
        })
        .join('');
}

function createScorePill(score) {
    const pill = document.createElement('span');
    pill.className = 'score-pill';
    const riskLevel = score?.risk_level || score?.verdict || 'Score';
    const riskScore = score?.risk_score;
    pill.textContent = riskScore === undefined || riskScore === null ? riskLevel : `${riskLevel} ${riskScore}`;
    return pill;
}

async function fetchJson(path) {
    const response = await fetch(path);
    if (!response.ok) {
        throw new Error(`${path} returned ${response.status}`);
    }
    return response.json();
}

function escapeHtml(value) {
    return String(value)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
}

function escapeAttribute(value) {
    return escapeHtml(value).replace(/`/g, '&#96;');
}

function toTitleCase(str) {
    return String(str).replace(/_/g, ' ').replace(/\b\w/g, l => l.toUpperCase());
}

function isUrl(str) {
    if (typeof str !== 'string' || str.length < 10) return false;
    return /^https?:\/\/[^\s]+\.[^\s]{2,}$/.test(str);
}

function isCode(str) {
    if (typeof str !== 'string' || str.length < 10) return false;
    const codePatterns = [
        /chrome\.[a-z]+\.[a-z]+/,
        /await\s+\w+\./,
        /function\s*\(/,
        /=>\s*{/,
        /const\s+\w+\s*=/,
        /\w+\.\w+\([^)]*\)/,
        /^\*:\/\/[^/]+\/\*/
    ];
    return codePatterns.some(pattern => pattern.test(str));
}

const SEVERITY_CONFIG = {
    critical: { color: '#dc2626', label: 'CRITICAL' },
    high: { color: '#ea580c', label: 'HIGH' },
    medium: { color: '#ca8a04', label: 'MEDIUM' },
    'medium-high': { color: '#d97706', label: 'MEDIUM-HIGH' },
    low: { color: '#16a34a', label: 'LOW' },
    info: { color: '#0284c7', label: 'INFO' },
    moderate: { color: '#ca8a04', label: 'MODERATE' },
    secure: { color: '#16a34a', label: 'SECURE' }
};

function detectSeverity(value) {
    if (typeof value !== 'string') return null;
    const val = value.toLowerCase().trim();
    if (['critical', 'severe'].includes(val)) return 'critical';
    if (['high', 'important'].includes(val)) return 'high';
    if (['medium-high'].includes(val)) return 'medium-high';
    if (['medium', 'moderate'].includes(val)) return 'medium';
    if (['low', 'minor'].includes(val)) return 'low';
    if (['info', 'informational'].includes(val)) return 'info';
    if (['secure', 'safe'].includes(val)) return 'secure';
    return null;
}

function createSeverityBadge(severity) {
    const config = SEVERITY_CONFIG[severity];
    if (!config) return null;

    const badge = document.createElement('span');
    badge.style.cssText = `
        display: inline-block;
        padding: 3px 10px;
        border-radius: 3px;
        font-size: 0.7rem;
        font-weight: 600;
        letter-spacing: 0.3px;
        background: ${config.color};
        color: white;
    `;
    badge.textContent = config.label;
    return badge;
}

function createTabNavigation(sections) {
    const tabContainer = document.createElement('div');
    tabContainer.style.cssText = 'border-bottom: 1px solid #dbe4f0; margin-bottom: 0; display: flex; gap: 0; overflow-x: auto; overflow-y: hidden; background: linear-gradient(180deg, #ffffff 0%, #f8fbff 100%); padding: 0;';
    tabContainer.id = 'aiAnalysisTabs';
    tabContainer.appendChild(createTab('summary', 'Summary', true));

    sections.forEach(section => {
        tabContainer.appendChild(createTab(section.key, section.title, false));
    });

    return tabContainer;
}

function createTab(key, title, isActive) {
    const tab = document.createElement('button');
    tab.style.cssText = `
        padding: 16px 24px;
        border: none;
        background: transparent;
        color: ${isActive ? 'var(--brand-primary)' : '#64748b'};
        font-size: 15px;
        font-weight: ${isActive ? '600' : '500'};
        cursor: pointer;
        border-bottom: ${isActive ? '3px solid var(--brand-primary)' : '3px solid transparent'};
        margin-bottom: -1px;
        transition: all 0.2s;
        white-space: nowrap;
    `;
    tab.textContent = title;
    tab.dataset.tabKey = key;
    tab.onclick = () => switchTab(key);
    return tab;
}

function switchTab(tabKey) {
    currentActiveTab = tabKey;
    document.querySelectorAll('#aiAnalysisTabs button').forEach(tab => {
        const isActive = tab.dataset.tabKey === tabKey;
        tab.style.background = 'transparent';
        tab.style.color = isActive ? 'var(--brand-primary)' : '#64748b';
        tab.style.fontWeight = isActive ? '600' : '500';
        tab.style.borderBottom = isActive ? '3px solid var(--brand-primary)' : '3px solid transparent';
    });
    renderTabContent(tabKey);
}

function renderTabContent(tabKey) {
    const contentContainer = document.getElementById('aiAnalysisContent');
    if (!contentContainer || !currentAnalysisData) return;

    contentContainer.innerHTML = '';
    contentContainer.style.cssText = 'padding: 20px 16px; background: #ffffff;';

    if (tabKey === 'summary') {
        renderSummary(contentContainer, currentAnalysisData);
    } else if (currentAnalysisData[tabKey]) {
        renderJSON(currentAnalysisData[tabKey], contentContainer, 1, tabKey);
    }
}

function renderSummary(container, data) {
    const summaryDiv = document.createElement('div');

    if (data.summary) {
        const summarySection = document.createElement('div');
        summarySection.style.cssText = 'background: #fafafa; border: 1px solid #e5e7eb; padding: 16px; margin-bottom: 16px;';

        const title = document.createElement('h2');
        title.style.cssText = 'margin: 0 0 12px 0; font-size: 18px; font-weight: 700; color: #111827;';
        title.textContent = 'Executive Summary';
        summarySection.appendChild(title);

        if (typeof data.summary === 'string') {
            const summaryText = document.createElement('p');
            summaryText.style.cssText = 'color: #374151; font-size: 15px; line-height: 1.7; margin: 0;';
            summaryText.textContent = data.summary;
            summarySection.appendChild(summaryText);
        } else if (typeof data.summary === 'object' && data.summary !== null) {
            renderJSON(data.summary, summarySection, 1, 'summary');
        }

        summaryDiv.appendChild(summarySection);
    }

    container.appendChild(summaryDiv);
}

function isCardLikeObject(obj) {
    if (typeof obj !== 'object' || obj === null || Array.isArray(obj)) return false;
    const cardPatterns = [
        'title', 'description', 'severity', 'risk', 'concern',
        'recommendation', 'impact', 'evidence', 'category',
        'finding', 'issue', 'vulnerability', 'warning'
    ];
    const keys = Object.keys(obj).map(k => k.toLowerCase());
    return cardPatterns.some(pattern => keys.includes(pattern));
}

function createDynamicCard(data, depth = 1) {
    const card = document.createElement('div');
    card.style.cssText = 'background: white; border: 1px solid #e5e7eb; padding: 12px; margin-bottom: 10px;';

    const priorityFields = ['severity', 'risk_level', 'status', 'title', 'name', 'type', 'category', 'id'];
    const descriptionFields = ['description', 'concern', 'issue', 'summary', 'overview'];
    const detailFields = ['evidence', 'locations', 'files', 'indicators', 'data_sent', 'usage', 'justification', 'analysis'];
    const impactFields = ['impact', 'risk', 'consequence'];
    const actionFields = ['recommendation', 'remediation', 'fix', 'solution'];
    const renderedFields = new Set();

    const header = document.createElement('div');
    header.style.cssText = 'display: flex; align-items: center; gap: 10px; margin-bottom: 8px; flex-wrap: wrap;';

    priorityFields.forEach(field => {
        if (data[field] && !renderedFields.has(field)) {
            const severity = detectSeverity(data[field]);
            if (severity) {
                const badge = createSeverityBadge(severity);
                if (badge) {
                    header.appendChild(badge);
                    renderedFields.add(field);
                }
            } else if (field === 'type' || field === 'category') {
                const label = document.createElement('span');
                label.style.cssText = 'background: #f3f4f6; padding: 3px 10px; border-radius: 3px; font-size: 0.75rem; font-weight: 600; color: #6b7280;';
                label.textContent = data[field];
                header.appendChild(label);
                renderedFields.add(field);
            }
        }
    });

    const titleField = priorityFields.find(f => ['title', 'name'].includes(f) && data[f]);
    if (titleField && data[titleField]) {
        const titleEl = document.createElement('div');
        titleEl.style.cssText = 'font-size: 15px; font-weight: 600; color: #111827; flex: 1;';
        titleEl.textContent = data[titleField];
        header.appendChild(titleEl);
        renderedFields.add(titleField);
    }

    if (header.children.length > 0) card.appendChild(header);

    if (data.id && !renderedFields.has('id')) {
        const idSpan = document.createElement('div');
        idSpan.style.cssText = 'font-family: monospace; color: #9ca3af; font-size: 12px; margin-bottom: 8px;';
        idSpan.textContent = data.id;
        card.appendChild(idSpan);
        renderedFields.add('id');
    }

    descriptionFields.forEach(field => {
        if (data[field] && !renderedFields.has(field)) {
            const desc = document.createElement('div');
            desc.style.cssText = 'margin-bottom: 8px; color: #4b5563; font-size: 14px; line-height: 1.5;';
            if (typeof data[field] === 'string') {
                desc.textContent = data[field];
            } else {
                renderJSON(data[field], desc, depth + 1, field);
            }
            card.appendChild(desc);
            renderedFields.add(field);
        }
    });

    detailFields.forEach(field => {
        if (data[field] && !renderedFields.has(field)) {
            appendLabeledBlock(card, field, data[field], depth);
            renderedFields.add(field);
        }
    });

    impactFields.forEach(field => {
        if (data[field] && !renderedFields.has(field)) {
            const impactDiv = document.createElement('div');
            impactDiv.style.cssText = 'margin-top: 8px; font-size: 14px; background: #fef2f2; border: 1px solid #fecaca; padding: 8px; border-radius: 4px;';
            const impactLabel = document.createElement('strong');
            impactLabel.style.cssText = 'color: #dc2626;';
            impactLabel.textContent = toTitleCase(field) + ': ';
            impactDiv.appendChild(impactLabel);
            const impactContent = document.createElement('span');
            impactContent.style.cssText = 'color: #4b5563;';
            if (typeof data[field] === 'string') {
                impactContent.textContent = data[field];
            } else {
                renderJSON(data[field], impactContent, depth + 1, field);
            }
            impactDiv.appendChild(impactContent);
            card.appendChild(impactDiv);
            renderedFields.add(field);
        }
    });

    actionFields.forEach(field => {
        if (data[field] && !renderedFields.has(field)) {
            const recDiv = document.createElement('div');
            recDiv.style.cssText = 'background: #f0fdf4; border: 1px solid #bbf7d0; padding: 8px; margin-top: 8px; font-size: 13px; border-radius: 4px;';
            const recLabel = document.createElement('div');
            recLabel.style.cssText = 'font-weight: 600; color: #15803d; margin-bottom: 4px;';
            recLabel.textContent = toTitleCase(field) + ':';
            recDiv.appendChild(recLabel);
            const recContent = document.createElement('div');
            recContent.style.cssText = 'color: #166534; line-height: 1.4;';
            if (typeof data[field] === 'string') {
                recContent.textContent = data[field];
            } else {
                renderJSON(data[field], recContent, depth + 1, field);
            }
            recDiv.appendChild(recContent);
            card.appendChild(recDiv);
            renderedFields.add(field);
        }
    });

    Object.keys(data).forEach(key => {
        if (!renderedFields.has(key) && !isEmptyValue(data[key])) {
            const fieldContainer = document.createElement('div');
            fieldContainer.style.cssText = 'margin-top: 8px; padding-top: 8px; border-top: 1px solid #f3f4f6;';
            const fieldLabel = document.createElement('div');
            fieldLabel.style.cssText = 'font-weight: 600; font-size: 13px; color: #374151; margin-bottom: 4px;';
            fieldLabel.textContent = toTitleCase(key) + ':';
            fieldContainer.appendChild(fieldLabel);
            const fieldValue = document.createElement('div');
            fieldValue.style.cssText = 'margin-left: 16px;';
            renderJSON(data[key], fieldValue, depth + 1, key);
            fieldContainer.appendChild(fieldValue);
            card.appendChild(fieldContainer);
            renderedFields.add(key);
        }
    });

    return card;
}

function appendLabeledBlock(card, field, value, depth) {
    const detailLabel = document.createElement('div');
    detailLabel.style.cssText = 'font-weight: 600; font-size: 13px; color: #374151; margin-bottom: 4px; margin-top: 8px;';
    detailLabel.textContent = toTitleCase(field) + ':';
    card.appendChild(detailLabel);

    const detailContainer = document.createElement('div');
    detailContainer.style.cssText = 'margin-left: 16px; margin-bottom: 8px;';
    renderJSON(value, detailContainer, depth + 1, field);
    card.appendChild(detailContainer);
}

function isEmptyValue(value) {
    return value === null || value === undefined || value === '' ||
        (Array.isArray(value) && value.length === 0) ||
        (typeof value === 'object' && !Array.isArray(value) && Object.keys(value).length === 0);
}

function renderJSON(data, container, depth = 0, parentKey = '') {
    if (isEmptyValue(data)) return;

    const type = typeof data;
    if (type === 'string' || type === 'number' || type === 'boolean') {
        renderPrimitive(data, container, parentKey);
        return;
    }

    if (Array.isArray(data)) {
        const isCardArray = data.length > 0 && data.every(item => isCardLikeObject(item));
        if (isCardArray) {
            data.forEach(item => container.appendChild(createDynamicCard(item, depth)));
            return;
        }

        const listContainer = document.createElement('div');
        listContainer.style.cssText = 'margin: 6px 0;';
        data.forEach((item) => {
            if (typeof item === 'object' && item !== null && !Array.isArray(item)) {
                if (isCardLikeObject(item)) {
                    listContainer.appendChild(createDynamicCard(item, depth + 1));
                } else {
                    const itemCard = document.createElement('div');
                    itemCard.style.cssText = 'background: #f9fafb; padding: 8px; margin-bottom: 6px; border: 1px solid #e5e7eb;';
                    renderJSON(item, itemCard, depth + 1, parentKey);
                    listContainer.appendChild(itemCard);
                }
            } else {
                const itemDiv = document.createElement('div');
                itemDiv.style.cssText = 'padding: 3px 0 3px 16px; position: relative;';
                const bullet = document.createElement('span');
                bullet.style.cssText = 'position: absolute; left: 0; color: #6b7280;';
                bullet.textContent = '-';
                itemDiv.appendChild(bullet);
                renderJSON(item, itemDiv, depth + 1, parentKey);
                listContainer.appendChild(itemDiv);
            }
        });
        container.appendChild(listContainer);
        return;
    }

    if (type === 'object') {
        const keys = Object.keys(data).filter(k => !SKIP_FIELDS.includes(k.toLowerCase()) && !isEmptyValue(data[k]));
        if (keys.length === 0) return;

        if (depth === 0) {
            keys.forEach(k => {
                const section = document.createElement('div');
                section.style.cssText = 'background: #fafafa; border: 1px solid #e5e7eb; padding: 12px; margin-bottom: 16px; margin-left: 0; margin-right: 0;';
                const title = document.createElement('h2');
                title.style.cssText = 'margin: 0 0 10px 0; font-size: 18px; font-weight: 700; color: #111827; border-bottom: 2px solid #d1d5db; padding-bottom: 6px;';
                title.textContent = toTitleCase(k);
                section.appendChild(title);
                renderJSON(data[k], section, depth + 1, k);
                container.appendChild(section);
            });
            return;
        }

        keys.forEach(k => {
            const value = data[k];
            if (typeof value === 'object' && value !== null) {
                const subSection = document.createElement('div');
                subSection.style.cssText = 'margin-bottom: 10px; padding: 10px; background: white; border: 1px solid #e5e7eb;';
                const subTitle = document.createElement('h3');
                subTitle.style.cssText = 'margin: 0 0 8px 0; font-size: 15px; font-weight: 600; color: #374151; border-bottom: 1px solid #e5e7eb; padding-bottom: 4px;';
                subTitle.textContent = toTitleCase(k);
                subSection.appendChild(subTitle);
                renderJSON(value, subSection, depth + 1, k);
                container.appendChild(subSection);
            } else {
                const kvDiv = document.createElement('div');
                kvDiv.style.cssText = 'padding: 4px 0; display: flex; gap: 8px;';
                const keySpan = document.createElement('span');
                keySpan.style.cssText = 'font-weight: 600; color: #4b5563; font-size: 14px; min-width: fit-content;';
                keySpan.textContent = toTitleCase(k) + ':';
                kvDiv.appendChild(keySpan);
                const valueSpan = document.createElement('span');
                valueSpan.style.cssText = 'color: #111827; font-size: 14px; flex: 1; word-break: break-word;';
                renderJSON(value, valueSpan, depth + 1, k);
                kvDiv.appendChild(valueSpan);
                container.appendChild(kvDiv);
            }
        });
    }
}

function renderPrimitive(data, container, parentKey) {
    const type = typeof data;
    if (type === 'string') {
        const severity = detectSeverity(data);
        if (severity && parentKey.toLowerCase().match(/severity|status|risk|level|priority|verdict/)) {
            const badge = createSeverityBadge(severity);
            if (badge) {
                container.appendChild(badge);
                return;
            }
        }

        if (isUrl(data)) {
            const link = document.createElement('a');
            link.href = data;
            link.target = '_blank';
            link.rel = 'noreferrer';
            link.style.cssText = 'color: #2563eb; text-decoration: none; word-break: break-all;';
            link.textContent = data;
            container.appendChild(link);
        } else if (isCode(data)) {
            const code = document.createElement('code');
            code.style.cssText = 'background: #f3f4f6; padding: 2px 6px; border-radius: 2px; font-size: 0.9em; color: #be123c; font-family: monospace; word-break: break-all;';
            code.textContent = data;
            container.appendChild(code);
        } else {
            const span = document.createElement('span');
            span.style.cssText = 'word-break: break-word;';
            span.textContent = data;
            container.appendChild(span);
        }
    } else {
        const span = document.createElement('span');
        span.style.cssText = `color: ${type === 'number' ? '#dc2626' : '#2563eb'}; font-weight: 500;`;
        span.textContent = data;
        container.appendChild(span);
    }
}

function renderJsonAnalysis(analysis) {
    const aiAnalyzerList = document.getElementById('aiAnalyzerList');
    aiAnalyzerList.innerHTML = '';
    aiAnalyzerList.style.cssText = 'background: #ffffff; max-width: 100%; box-sizing: border-box;';
    currentAnalysisData = analysis;
    currentActiveTab = 'summary';

    const sections = Object.keys(analysis)
        .filter(k => !SKIP_FIELDS.includes(k.toLowerCase()))
        .filter(k => k.toLowerCase() !== 'summary')
        .filter(k => !isEmptyValue(analysis[k]))
        .map(k => ({ key: k, title: toTitleCase(k) }));

    aiAnalyzerList.appendChild(createTabNavigation(sections));

    const contentContainer = document.createElement('div');
    contentContainer.id = 'aiAnalysisContent';
    contentContainer.style.cssText = 'min-height: 400px;';
    aiAnalyzerList.appendChild(contentContainer);

    renderTabContent('summary');
}

    </script>
